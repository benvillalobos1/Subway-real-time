<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Tracker</title>
</head>
<body>
    <script>
        const ws = new WebSocket("ws://localhost:8080")

        ws.onopen = () => {
            console.log("Connection secured via WebSocket")
        }

        ws.onmessage = (event) => {
            const trains = JSON.parse(event.data)

            console.log("Red line trains:", trains["RD"])
        }
    </script>
</body>
</html>
